<!DOCTYPE html>
<html lang="en">
<head>
	<title>Narrow Down Your Menu Choice</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="styles/bootstrap.min.css">
	<link rel="stylesheet" href="styles/styles.css">
</head>
<body ng-app="NarrowItDownApp">
	<div ng-controller="NarrowItDownController as narrowCtrl" class="container">
		<h1>Narrow Down Your Chinese Menu Choice</h1>

		<div class="form-group">
			<input ng-model="narrowCtrl.searchTerm" type="text" placeholder="search term" class="form-control">
		</div>
		<div class="form-group narrow-button">
			<button ng-click="narrowCtrl.logItems()" class="btn btn-primary">Narrow It Down For Me!</button>
		</div>

		<!-- found-items should be implemented as a component -->
		<found-items found-items="...." on-remove="...."></found-items>
	</div>

	<script src="../angular.min.js"></script>
	<script src="./script/app.js"></script>
</body>
</html>
